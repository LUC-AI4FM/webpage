name: Mirror to LUC-AI4FM/webpage

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git config --global credential.helper ""
          git remote add mirror https://arslanbisharat:${MIRROR_PAT}@github.com/LUC-AI4FM/webpage.git
          git push mirror main --force
